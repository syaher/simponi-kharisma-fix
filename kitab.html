<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pustaka Al-Kharisma</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #f0f4fa, #e2e8f0);
  min-height: 100vh;
  color: #0f172a;
}

.app-container {
  max-width: 1400px;
  margin: auto;
  padding: 20px 24px 32px;
}

/* HEADER */
.top-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 28px;
}

.back-button {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: #fff;
  padding: 10px 24px;
  border-radius: 60px;
  font-weight: 600;
  color: #1e4a76;
  cursor: pointer;
  border: 1px solid #cbd5e1;
  box-shadow: 0 2px 6px rgba(0,0,0,.05);
  transition: .25s;
}

.back-button:hover {
  transform: translateX(-4px);
}

.library-title-badge {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.library-title-badge h1 {
  font-size: 1.8rem;
  font-weight: 800;
  background: linear-gradient(120deg, #0c4a6e, #2c7a4a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.badge-counter {
  background: #1e293b;
  color: #fff;
  padding: 4px 12px;
  border-radius: 40px;
  font-size: .8rem;
}

/* SEARCH */
.filter-panel {
  background: #fff;
  border-radius: 28px;
  padding: 12px 24px;
  margin-bottom: 32px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 12px rgba(0,0,0,.05);
}

.search-wrapper {
  flex: 2;
  min-width: 240px;
  position: relative;
}

.search-wrapper i {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: #5b6e8c;
}

.search-wrapper input {
  width: 100%;
  padding: 12px 20px 12px 48px;
  border: 1px solid #cfdfed;
  border-radius: 60px;
  font-family: inherit;
}

.filter-stats {
  background: #eef3fc;
  padding: 6px 18px;
  border-radius: 40px;
  font-size: .85rem;
  color: #1e3a5f;
}

/* GRID */
.kitab-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 28px;
}

.kitab-card {
  background: #fff;
  border-radius: 24px;
  overflow: hidden;
  cursor: pointer;
  transition: .3s;
  box-shadow: 0 12px 22px -12px rgba(0,0,0,.15);
}

.kitab-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 24px 32px -12px rgba(0,0,0,.25);
}

.kitab-cover-art {
  background: linear-gradient(145deg, #1f3b4c, #0f2c3f);
  padding: 32px 16px;
  text-align: center;
}

.kitab-cover-art i {
  font-size: 58px;
  color: #e9c46a;
}

.kitab-nama {
  font-family: 'Amiri', serif;
  font-size: 1.2rem;
  color: #fff;
  margin-top: 12px;
}

.kitab-info {
  padding: 16px 12px;
}

.kitab-penulis {
  font-size: .75rem;
  color: #4b5563;
  margin-bottom: 8px;
}

.open-badge {
  display: inline-block;
  margin-top: 8px;
  background: #eef2ff;
  color: #1e40af;
  padding: 4px 12px;
  border-radius: 40px;
  font-size: .7rem;
  font-weight: 600;
}

/* MODAL VIEWER */
.viewer-modal {
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 99999;
  display: none;
  flex-direction: column;
}

.viewer-header {
  height: 60px;
  background: #0f172a;
  color: white;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  flex-shrink: 0;
}

.viewer-back {
  background: #1e293b;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 8px 14px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
}

.viewer-title {
  font-size: .9rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.viewer-frame {
  flex: 1;
  width: 100%;
  border: none;
}


/* Footer dengan container putih dan tulisan biru kecil rata kiri */
.app-footer {
  background: white;
  border-radius: 10px;
  box-shadow: 0 1px 6px rgba(0, 0, 0, 0.1);
  padding: 10px 14px;
  margin-top: 18px;
  text-align: center;
}

.app-footer img {
  height: 20px;
  margin: 3px 6px 3px 0;
  vertical-align: middle;
}

/* Responsive adjustments untuk footer */
@media (max-width: 480px) {
  .app-footer {
    padding: 8px 12px;
    margin-top: 15px;
  }
  .app-footer img {
    height: 18px;
    margin: 2px 4px 2px 0;
  }
}

/* =========================
   RESPONSIVE 2 KOLOM DI HP
========================= */
@media (max-width: 640px) {
  .kitab-grid {
    /* Paksa selalu 2 kolom */
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .kitab-card {
    border-radius: 18px;
  }

  .kitab-cover-art {
    padding: 22px 10px;
  }

  .kitab-cover-art i {
    font-size: 42px;
  }

  .kitab-nama {
    font-size: 0.95rem;
    line-height: 1.35;
    margin-top: 8px;
    min-height: 2.6em; /* tinggi konsisten untuk 2 baris */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .kitab-info {
    padding: 10px;
  }

  .kitab-penulis {
    font-size: 0.68rem;
    line-height: 1.4;
    min-height: 2.8em; /* tinggi konsisten */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .open-badge {
    display: block;
    width: 100%;
    text-align: center;
    margin-top: 6px;
    padding: 5px 8px;
    font-size: 0.65rem;
  }

  .library-title-badge h1 {
    font-size: 1.25rem;
  }

  .search-wrapper input {
    font-size: 0.9rem;
  }

  .filter-panel {
    padding: 12px 14px;
  }
}
</style>
</head>
<body>

<div class="app-container">

  <div class="top-nav">
    <div class="back-button" onclick="goBackToMainApp()">
      <i class="material-icons">arrow_back</i>
      <span>Kembali ke Menu Utama</span>
    </div>

    <div class="library-title-badge">
      <h1><i class="fas fa-book-open"></i> Pustaka Al-Kharisma</h1>
      <div class="badge-counter" id="totalCounter">0 Kitab</div>
    </div>
  </div>

  <div class="filter-panel">
    <div class="search-wrapper">
      <i class="material-icons">search</i>
      <input type="text" id="searchKitabField" placeholder="Cari kitab...">
    </div>
    <div class="filter-stats" id="resultStats">📖 Menampilkan semua kitab</div>
  </div>

  <div id="kitabGridContainer" class="kitab-grid"></div>



<!-- MODAL VIEWER -->
<div id="viewerModal" class="viewer-modal">
  <div class="viewer-header">
    <button class="viewer-back" onclick="closeViewer()">
      ← Kembali
    </button>
    <div class="viewer-title" id="viewerTitle">Membuka kitab...</div>
  </div>

  <iframe id="viewerFrame" class="viewer-frame" allowfullscreen></iframe>
</div>

<script>
/* ================= DATA ================= */
const KITAB_DATA = [
  {
    id: 1,
    nama: "تقريرات",
    namaLatin: "Taqrirat",
    penulis: "MHM Lirboyo",
    url: "https://online.pubhtml5.com/ilmxb/uanr/"
  },
  {
    id: 2,
    nama: "فتح القريب",
    namaLatin: "Fathul Qorib Al-Mujib",
    penulis: "Syekh Ibnu Qasim Al-Ghazi",
    url: "https://online.pubhtml5.com/ilmxb/mtpd/"
  },
  {
    id: 3,
    nama: "الفية ابن مالك",
    namaLatin: "Alfiyah Ibnu Malik",
    penulis: "Syekh Imam Ibnu Maik",
    url: "https://online.pubhtml5.com/ilmxb/xmwc/"
  },
  {
    id: 4,
    nama: "الأمثلة التصريفية",
    namaLatin: "Amtsilah At-tashrifiyah",
    penulis: "Syekh Muhammad Ma'shum bin Ali",
    url: "https://online.pubhtml5.com/ilmxb/kgzk/"
  },
  {
    id: 5,
    nama: "متن الغاية والتقريب",
    namaLatin: "Matan Taqrib",
    penulis: "Syekh Abu Syuja'",
    url: "https://online.pubhtml5.com/ilmxb/fbly/"
  },
  {
    id: 6,
    nama: "سلم التوفيق",
    namaLatin: "Sulam At-taufiq",
    penulis: "Syekh Abdullah bin Husain bin Thahir Al-'Alawi",
    url: "https://online.pubhtml5.com/ilmxb/dxxy/"
  }
];

let filteredKitabs = [...KITAB_DATA];

const gridContainer = document.getElementById("kitabGridContainer");
const searchInput = document.getElementById("searchKitabField");
const totalCounter = document.getElementById("totalCounter");
const resultStats = document.getElementById("resultStats");

const viewerModal = document.getElementById("viewerModal");
const viewerFrame = document.getElementById("viewerFrame");
const viewerTitle = document.getElementById("viewerTitle");

/* ================= RENDER ================= */
function renderKitabs() {
  totalCounter.textContent = `${filteredKitabs.length} Kitab`;

  if (filteredKitabs.length === 0) {
    gridContainer.innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:60px;">
        Tidak ditemukan kitab
      </div>
    `;
    return;
  }

  gridContainer.innerHTML = filteredKitabs.map(kitab => `
    <div class="kitab-card" onclick="openViewer(${kitab.id})">
      <div class="kitab-cover-art">
        <i class="fas fa-book-open"></i>
        <div class="kitab-nama">${kitab.nama}</div>
      </div>
      <div class="kitab-info">
        <div class="kitab-penulis">${kitab.penulis}</div>
        <span class="open-badge">Baca Sekarang</span>
      </div>
    </div>
  `).join("");
}

/* ================= SEARCH ================= */
searchInput.addEventListener("input", function() {
  const q = this.value.toLowerCase();

  filteredKitabs = KITAB_DATA.filter(k =>
    k.nama.toLowerCase().includes(q) ||
    k.namaLatin.toLowerCase().includes(q) ||
    k.penulis.toLowerCase().includes(q)
  );

  resultStats.textContent =
    `📖 Menampilkan ${filteredKitabs.length} kitab`;

  renderKitabs();
});

/* ================= OPEN VIEWER ================= */
function openViewer(id) {
  const kitab = KITAB_DATA.find(k => k.id === id);
  if (!kitab) return;

  viewerTitle.textContent = kitab.namaLatin || kitab.nama;
  viewerFrame.src = kitab.url;
  viewerModal.style.display = "flex";

  // Push history agar tombol back browser menutup viewer
  history.pushState({ viewerOpen: true }, "", "#baca-kitab");

  // Auto close ads di dalam iframe (jika memungkinkan)
  startAdCleaner();
}

/* ================= CLOSE VIEWER ================= */
function closeViewer() {
  viewerModal.style.display = "none";
  viewerFrame.src = "";
  viewerTitle.textContent = "Membuka kitab...";
}

/* ================= BACK BROWSER ================= */
window.addEventListener("popstate", function() {
  if (viewerModal.style.display === "flex") {
    closeViewer();
  } else {
    window.location.href = "jindex.html";
  }
});

/* ================= MENU BACK ================= */
function goBackToMainApp() {
  window.location.href = "jindex.html";
}


/* ================= AUTO CLOSE ADS ================= */
function startAdCleaner() {
  let attempts = 0;

  const interval = setInterval(() => {
    attempts++;

    try {
      const iframeDoc =
        viewerFrame.contentDocument ||
        viewerFrame.contentWindow.document;

      // Cari tombol close iklan
      iframeDoc.querySelectorAll("button, div, span").forEach(el => {
        const txt = (el.textContent || "").trim();
        if (
          txt === "×" ||
          txt === "✕" ||
          txt === "X"
        ) {
          el.click();
        }
      });

      // Hapus elemen fixed bawah
      iframeDoc.querySelectorAll("div").forEach(el => {
        const style = iframeDoc.defaultView.getComputedStyle(el);
        if (
          style.position === "fixed" &&
          parseInt(style.bottom || "0") <= 10 &&
          el.offsetHeight < 200
        ) {
          el.remove();
        }
      });

    } catch (e) {
      // Cross-origin iframe biasanya memblokir akses
    }

    if (attempts > 30) clearInterval(interval);
  }, 500);
}

/* ================= INIT ================= */
renderKitabs();
</script>
<div class="app-footer">
  <img src="https://img.shields.io/badge/version-v2.2.2-orange" alt="Version">
  <img src="https://img.shields.io/badge/license-Proprietary-red" alt="License">
  <img src="https://img.shields.io/badge/status-Internal%20Use-blue" alt="Status">
  <img src="https://img.shields.io/badge/%C2%A9%202026%20Ndalem%20Kharisma-Semua%20hak%20dilindungi%20undang%E2%80%90undang-red" 
       alt="Copyright">
</div>
</body>
</html>
